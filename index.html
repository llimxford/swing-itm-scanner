<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Swing ITM Scanner</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#060608;color:#eeeef5;font-family:monospace;min-height:100vh}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:#2a2a3a;border-radius:2px}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.header{background:#0c0c12;border-bottom:1px solid #ffffff08;padding:16px 24px;position:sticky;top:0;z-index:10}
.header-inner{max-width:1100px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10}
.logo{display:flex;gap:8px;align-items:baseline}
.logo span{font-size:20px;font-weight:900;letter-spacing:4px}
.hi{color:#00ff88}
.sub{font-size:9px;color:#44445a;letter-spacing:2px;margin-top:2px}
.dot{width:7px;height:7px;border-radius:50%;background:#44445a;transition:all 0.3s}
.dot.on{background:#00ff88;box-shadow:0 0 8px #00ff88;animation:pulse 1.2s infinite}
.status{font-size:9px;color:#44445a;letter-spacing:1px}
.status.on{color:#00ff88}
.btn-ghost{font-family:monospace;font-size:9px;background:transparent;border:1px solid #ffffff08;color:#44445a;padding:4px 10px;border-radius:4px;cursor:pointer}
.main{max-width:1100px;margin:0 auto;padding:20px 24px}
.setup{min-height:80vh;display:flex;align-items:center;justify-content:center;padding:24px}
.setup-box{max-width:440px;width:100%;animation:fadeUp 0.5s ease}
.slabel{font-size:9px;color:#44445a;letter-spacing:3px;margin-bottom:6px}
.stitle{font-size:26px;font-weight:900;margin-bottom:8px;line-height:1.2}
.ssub{font-size:11px;color:#44445a;line-height:1.8;margin-bottom:24px}
.ssub a{color:#00ff88;text-decoration:none}
.spanel{background:#0c0c12;border:1px solid #ffffff08;border-radius:10px;padding:20px;margin-bottom:14px}
.flabel{font-size:8px;color:#44445a;letter-spacing:1px;margin-bottom:6px}
.finput{width:100%;background:#1a1a28;border:1px solid #ffffff10;border-radius:6px;padding:10px 14px;font-family:monospace;font-size:12px;color:#eeeef5;outline:none;margin-bottom:14px}
.cbtn{width:100%;padding:12px;border-radius:6px;font-family:monospace;font-size:13px;font-weight:700;letter-spacing:2px;border:none;cursor:not-allowed;background:#1a1a28;color:#44445a;transition:all 0.3s}
.cbtn.ready{cursor:pointer;background:#00ff88;color:#000;box-shadow:0 0 20px #00ff8844}
.snote{font-size:9px;color:#2a2a4a;line-height:1.9}
.serr{font-size:10px;color:#ff2d55;margin-bottom:12px;padding:8px 10px;background:#ff2d5510;border-radius:4px;border:1px solid #ff2d5530}
.banner{background:#00ff8808;border:1px solid #00ff8820;border-radius:8px;padding:10px 14px;margin-bottom:16px}
.controls{background:#0c0c12;border:1px solid #ffffff08;border-radius:12px;padding:20px;margin-bottom:22px}
.section-label{font-size:8px;color:#44445a;letter-spacing:1.5px;margin-bottom:10px}
.tickers{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
.tbtn{font-family:monospace;font-size:11px;font-weight:700;padding:5px 12px;border-radius:5px;cursor:pointer;transition:all 0.15s;background:#1a1a28;color:#44445a;border:1px solid #ffffff08}
.tbtn.on{background:#00ff88;color:#000;border-color:#00ff88;box-shadow:0 0 10px #00ff8833}
.custom-row{display:flex;gap:8px;align-items:center;margin-bottom:16px;flex-wrap:wrap}
.cinput{font-family:monospace;font-size:11px;background:#1a1a28;border:1px solid #ffffff08;color:#eeeef5;padding:7px 12px;border-radius:6px;outline:none;width:150px}
.add-btn{font-family:monospace;font-size:10px;background:#1a1a28;border:1px solid #ffffff08;color:#44445a;padding:7px 12px;border-radius:6px;cursor:pointer}
.ctag{font-family:monospace;font-size:10px;padding:6px 11px;background:#1a1a28;border:1px solid #00ff8830;color:#00ff88;border-radius:5px;cursor:pointer}
.filter-row{display:flex;gap:20px;align-items:center;flex-wrap:wrap;border-top:1px solid #ffffff08;padding-top:16px}
.fbtn{font-family:monospace;font-size:10px;font-weight:700;padding:5px 12px;border-radius:4px;cursor:pointer;background:#1a1a28;color:#44445a;border:1px solid #ffffff08;transition:all 0.15s}
.fbtn.on{background:#00ff88;color:#000;border-color:#00ff88}
.scan-btn{font-family:monospace;font-size:12px;font-weight:700;letter-spacing:2px;padding:11px 28px;border-radius:7px;cursor:not-allowed;border:none;transition:all 0.25s;background:#1a1a28;color:#44445a}
.scan-btn.ready{cursor:pointer;background:#00ff88;color:#000;box-shadow:0 0 22px #00ff8844}
.scan-btn.stop{cursor:pointer;background:#ff2d55;color:#fff}
.stats{display:flex;gap:16px}
.stat .sl{font-size:8px;color:#44445a}.stat .sv{font-size:16px;font-weight:900}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:14px}
.card{background:#10101a;border-radius:12px;overflow:hidden;border:1px solid #ffffff08;animation:fadeUp 0.4s ease}
.card-bar{height:2px}
.card-body{padding:18px}
.ring-wrap{position:relative;width:64px;height:64px;flex-shrink:0}
.ring-wrap svg{position:absolute;top:0;left:0;transform:rotate(-90deg)}
.ring-inner{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.score-sec{background:#1a1a28;border-radius:8px;padding:12px 14px;margin-bottom:14px;display:flex;flex-direction:column;gap:7px}
.srow{display:flex;align-items:center;gap:8px}
.slb{font-size:9px;color:#44445a;width:112px;flex-shrink:0}
.strk{flex:1;height:3px;background:#0c0c12;border-radius:2px;overflow:hidden}
.sfil{height:100%;border-radius:2px}
.chip{font-size:9px;letter-spacing:1px;padding:3px 8px;border-radius:3px}
.targets{display:flex;gap:5px;margin-bottom:14px}
.tbox{background:#1a1a28;border-radius:7px;padding:8px 6px;flex:1}
.tbox label{font-size:7px;color:#44445a;display:block;margin-bottom:3px}
.tbox span{font-size:11px;font-weight:700}
.contract{background:#1a1a28;border-radius:8px;padding:14px;margin-bottom:14px}
.cgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px}
.cgrid label{font-size:7px;color:#44445a;display:block}
.cgrid span{font-size:11px;font-weight:700}
.thesis{font-size:11px;color:#9090b8;line-height:1.8;border-top:1px solid #ffffff08;padding-top:12px;margin-bottom:12px}
.inv{background:#ff2d550a;border:1px solid #ff2d5525;border-radius:6px;padding:8px 12px;margin-bottom:12px;font-size:10px;color:#9090b8}
.tags{display:flex;gap:6px;flex-wrap:wrap}
.loading-card{background:#10101a;border:1px solid #ffffff08;border-radius:12px;padding:18px;display:flex;align-items:center;gap:10;margin-bottom:14px}
.spinner{width:14px;height:14px;border:2px solid #1a1a28;border-top:2px solid #00ff88;border-radius:50%;animation:spin 0.7s linear infinite;flex-shrink:0}
.error-card{background:#10101a;border:1px solid #ff2d5530;border-radius:12px;padding:18px;margin-bottom:14px}
.below-sec{background:#0c0c12;border:1px solid #ffffff08;border-radius:8px;padding:12px 16px;margin-top:16px}
.empty{text-align:center;padding-top:80px}
.footer{margin-top:50px;font-size:9px;color:#1a1a28;text-align:center;line-height:2;padding-bottom:30px}
</style>
</head>
<body>
<div id="app"></div>
<script>
const PRESETS=["SPY","QQQ","AAPL","NVDA","MSFT","INTC","AMD","META","TSLA","AMZN","GOOGL","IWM","PLTR","NFLX","JPM","GS","COIN","MSTR"];
const TODAY=new Date().toLocaleDateString("en-US",{weekday:"long",year:"numeric",month:"long",day:"numeric"});
const EXP=(()=>{const d=new Date();d.setDate(d.getDate()+35);return d.toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});})();
const WORKER="https://late-boat-3ede.llimxford.workers.dev";

let state={
  finnhubKey:localStorage.getItem("fh_key")||"",
  claudeKey:localStorage.getItem("cl_key")||"",
  keysReady:!!(localStorage.getItem("fh_key")&&localStorage.getItem("cl_key")),
  selected:["NVDA","AAPL","SPY","INTC"],
  results:[],scanning:false,aborted:false,
  sigFilter:"ALL",scanCount:0,customInput:"",setupErr:"",testing:false
};

function setState(p){state={...state,...p};render();}

async function fetchPrice(ticker){
  const res=await fetch(`${WORKER}?ticker=${ticker}&key=${state.finnhubKey}`);
  if(!res.ok)throw new Error(`Worker error ${res.status}`);
  const d=await res.json();
  if(d.error)throw new Error(d.error);
  if(!d.c||d.c===0)throw new Error(`No price for ${ticker}`);
  return{price:+d.c.toFixed(2),change:d.dp?+d.dp.toFixed(2):0};
}

async function claudeAnalyze(ticker,price,change){
  const p=price;
  const res=await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{"Content-Type":"application/json","x-api-key":state.claudeKey,"anthropic-version":"2023-06-01","anthropic-dangerous-allow-browser":"true"},
    body:JSON.stringify({
      model:"claude-opus-4-5",
      max_tokens:1024,
      messages:[{role:"user",content:`You are a professional swing trade options analyst. Today is ${TODAY}.

${ticker} LIVE PRICE: $${p} (${change>=0?"+":""}${change}% today). Use $${p} for ALL calculations.

Analyze for HIGH-PROBABILITY ITM swing trade. A-grade only (score 75+).

RULES:
- Score 75+ required else signal="NO TRADE"
- Win rate 75%+ required
- BUY=bullish ITM CALL delta 0.65-0.85 strike BELOW $${p}
- SELL=bearish ITM PUT delta 0.65-0.85 strike ABOVE $${p}
- Expiry ${EXP} 30-40 DTE
- Min 2:1 R/R
- NEVER return 0 for any number

RESPOND WITH ONLY VALID JSON NO BACKTICKS NO MARKDOWN START WITH { END WITH }

{"ticker":"${ticker}","price":${p},"change":${change},"trend":"BULLISH","strength":"STRONG","signal":"BUY","control":"BUYERS","score":80,"winRate":78,"pop":72,"trendPts":21,"setupPts":20,"optionsPts":16,"volumePts":12,"rrPts":11,"setupName":"Trend Continuation","timeframe":"Daily + Weekly","keyLevel":${(p*0.97).toFixed(2)},"keyType":"SUPPORT","entry":${p},"tp1":${(p*1.04).toFixed(2)},"tp2":${(p*1.08).toFixed(2)},"stop":${(p*0.96).toFixed(2)},"rr":"2.5:1","optType":"CALL","strike":${(p*0.95).toFixed(2)},"expiry":"${EXP}","dte":35,"delta":0.74,"premium":${(p*0.055).toFixed(2)},"itmDepth":${(p*0.05).toFixed(2)},"maxRisk":${Math.round(p*5.5)},"targetExit":${(p*0.085).toFixed(2)},"catalyst1":"momentum","catalyst2":"sector strength","warning":"","thesis":"Real 3-sentence swing thesis for ${ticker} at $${p}.","invalidation":"Specific price invalidating this trade."}`}]
    })
  });
  const json=await res.json();
  if(json.error)throw new Error(json.error.message);
  const text=(json.content||[]).map(b=>b.text||"").join("").trim();
  const i=text.indexOf("{"),j=text.lastIndexOf("}");
  if(i<0||j<0)throw new Error("No JSON: "+text.slice(0,80));
  const d=JSON.parse(text.slice(i,j+1));
  d.price=p;d.change=change;
  if(!d.entry||!d.entry)d.entry=p;
  if(!d.strike||d.strike===0)d.strike=+(p*0.95).toFixed(2);
  if(!d.premium||d.premium===0)d.premium=+(p*0.055).toFixed(2);
  if(!d.tp1||d.tp1===0)d.tp1=+(p*1.04).toFixed(2);
  if(!d.tp2||d.tp2===0)d.tp2=+(p*1.08).toFixed(2);
  if(!d.stop||d.stop===0)d.stop=+(p*0.96).toFixed(2);
  if(!d.itmDepth||d.itmDepth===0)d.itmDepth=+(p-d.strike).toFixed(2);
  if(!d.maxRisk||d.maxRisk===0)d.maxRisk=Math.round(d.premium*100);
  if(!d.targetExit||d.targetExit===0)d.targetExit=+(d.premium*1.55).toFixed(2);
  d.scores={trend:d.trendPts,setup:d.setupPts,options:d.optionsPts,volume:d.volumePts,rr:d.rrPts};
  d.catalysts=[d.catalyst1,d.catalyst2].filter(Boolean);
  d.warnings=[d.warning].filter(Boolean);
  return d;
}

async function runScan(){
  if(!state.selected.length||state.scanning)return;
  state.aborted=false;
  setState({scanning:true,scanCount:state.scanCount+1,
    results:state.selected.map(t=>({ticker:t,status:"loading",data:null,error:null,price:null,step:"price"}))});
  for(const ticker of state.selected){
    if(state.aborted)break;
    try{
      updateResult(ticker,{step:"price"});
      const{price,change}=await fetchPrice(ticker);
      updateResult(ticker,{price,step:"analysis"});
      const data=await claudeAnalyze(ticker,price,change);
      updateResult(ticker,{status:"done",data});
    }catch(e){updateResult(ticker,{status:"error",error:e.message});}
    await sleep(400);
  }
  setState({scanning:false});
}

function updateResult(ticker,patch){state.results=state.results.map(r=>r.ticker===ticker?{...r,...patch}:r);render();}
function sleep(ms){return new Promise(r=>setTimeout(r,ms));}

function grade(s){
  if(s>=85)return{l:"A+",c:"#00ff88",t:"PRIME"};
  if(s>=75)return{l:"A",c:"#00e676",t:"HIGH PROB"};
  if(s>=65)return{l:"B+",c:"#69f0ae",t:"SOLID"};
  return{l:"B",c:"#ffab00",t:"MODERATE"};
}

function chip(label,color="#44445a"){
  return`<span class="chip" style="color:${color};border:1px solid ${color}35;background:${color}15">${label}</span>`;
}

function sbar(label,val,max,col){
  return`<div class="srow"><span class="slb">${label}</span><div class="strk"><div class="sfil" style="width:${Math.min(100,Math.round((val/max)*100))}%;background:${col}"></div></div><span style="font-size:9px;color:${col};width:28px;text-align:right">${val}/${max}</span></div>`;
}

function renderCard(r){
  if(r.status==="loading")return`<div class="loading-card"><div class="spinner"></div><span style="font-size:12px;color:#44445a;margin-left:10px">${r.step==="price"?"Fetching "+r.ticker+" live price...":"Analyzing "+r.ticker+" at $"+r.price+"..."}</span></div>`;
  if(r.status==="error")return`<div class="error-card"><div style="font-size:10px;color:#ff2d55;word-break:break-word;line-height:1.7"><strong>⚠ ${r.ticker}:</strong><br>${r.error}</div></div>`;
  const d=r.data;
  if(!d)return"";
  if(d.signal==="NO TRADE"||(d.score||0)<75)return"";
  const g=grade(d.score||0),sc=d.signal==="BUY"?"#00ff88":"#ff2d55",tc=d.trend==="BULLISH"?"#00ff88":d.trend==="BEARISH"?"#ff2d55":"#ffcc00",ac=d.optType==="CALL"?"#00ff88":"#ff2d55",s=d.scores||{},chg=d.change||0;
  const r2=28,C=2*Math.PI*r2,f=(d.score/100)*C;
  return`<div class="card" style="border-color:${sc}20">
    <div class="card-bar" style="background:linear-gradient(90deg,${sc},transparent)"></div>
    <div class="card-body">
      <div style="display:flex;gap:14px;align-items:flex-start;margin-bottom:16px">
        <div class="ring-wrap"><svg width="64" height="64"><circle cx="32" cy="32" r="${r2}" fill="none" stroke="#1a1a28" stroke-width="4"/><circle cx="32" cy="32" r="${r2}" fill="none" stroke="${g.c}" stroke-width="4" stroke-dasharray="${f} ${C}" stroke-linecap="round" style="filter:drop-shadow(0 0 5px ${g.c}88)"/></svg><div class="ring-inner"><span style="font-size:14px;font-weight:900;color:${g.c};line-height:1">${g.l}</span><span style="font-size:8px;color:#44445a">${d.score}</span></div></div>
        <div style="flex:1;min-width:0">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:5px;flex-wrap:wrap">
            <span style="font-size:20px;font-weight:900;letter-spacing:3px">${d.ticker}</span>
            <span style="font-size:11px;font-weight:700;letter-spacing:2px;padding:3px 10px;border-radius:4px;background:${sc};color:#000;box-shadow:0 0 14px ${sc}55">${d.signal}</span>
            ${chip(d.trend,tc)}${chip(d.strength)}
          </div>
          <div style="font-size:11px;color:#44445a">
            <span style="font-size:15px;font-weight:700;color:#eeeef5">$${d.price}</span>
            <span style="margin-left:8px;color:${chg>=0?"#00ff88":"#ff2d55"}">${chg>=0?"▲":"▼"}${Math.abs(chg)}%</span>
            <span style="margin-left:6px;font-size:9px;color:#00ff88">● LIVE</span>
            <span style="margin-left:8px">${d.control} in control</span>
          </div>
        </div>
        <div style="text-align:right;flex-shrink:0">
          <div style="font-size:7px;color:#44445a">WIN RATE</div>
          <div style="font-size:22px;font-weight:900;color:${g.c};line-height:1.1">${d.winRate}%</div>
          <div style="font-size:7px;color:${g.c}">${g.t}</div>
        </div>
      </div>
      <div class="score-sec">
        <div style="font-size:7px;color:#44445a;letter-spacing:1.5px;margin-bottom:2px">SETUP SCORE</div>
        ${sbar("TREND ALIGNMENT",s.trend||0,25,"#00ff88")}
        ${sbar("SETUP QUALITY",s.setup||0,25,"#4fc3f7")}
        ${sbar("OPTIONS STRUCTURE",s.options||0,20,"#ffcc00")}
        ${sbar("VOLUME/MOMENTUM",s.volume||0,15,"#00ff88")}
        ${sbar("RISK/REWARD",s.rr||0,15,"#ffcc00")}
      </div>
      <div style="display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;align-items:center">
        <span style="font-size:10px;font-weight:700;color:${sc}">⬡ ${d.setupName||""}</span>
        ${chip(d.timeframe||"","#4fc3f7")}${chip((d.keyType||"")+" $"+(d.keyLevel||0),"#ffcc00")}${chip("PoP "+(d.pop||0)+"%","#00ff88")}
      </div>
      <div class="targets">
        ${[["ENTRY","$"+d.entry,"#eeeef5"],["TP1","$"+d.tp1,"#00ff88"],["TP2","$"+d.tp2,"#69f0ae"],["STOP","$"+d.stop,"#ff2d55"],["R:R",d.rr,"#ffcc00"]].map(([l,v,c])=>`<div class="tbox"><label>${l}</label><span style="color:${c}">${v}</span></div>`).join("")}
      </div>
      <div class="contract" style="border:1px solid ${ac}25">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
          <span style="font-size:11px;font-weight:700;letter-spacing:2px;padding:3px 10px;border-radius:4px;background:${ac};color:#000">${d.optType||""}</span>
          <span style="font-size:9px;color:#44445a">ITM CONTRACT</span>
          <span style="font-size:10px;color:#ffcc00">Δ ${Number(d.delta||0).toFixed(2)}</span>
        </div>
        <div class="cgrid">
          ${[["STRIKE","$"+(d.strike||0),ac],["EXPIRY",d.expiry||"",ac],["DTE",(d.dte||0)+"d","#ffcc00"],["PREMIUM","$"+(d.premium||0),"#eeeef5"],["ITM DEPTH","$"+(d.itmDepth||0),ac],["MAX RISK","$"+(d.maxRisk||0),"#ff2d55"]].map(([l,v,c])=>`<div><label>${l}</label><span style="color:${c}">${v}</span></div>`).join("")}
        </div>
        <div style="display:flex;justify-content:space-between;border-top:1px solid #ffffff08;padding-top:8px">
          <div><div style="font-size:7px;color:#44445a">ENTRY PREMIUM</div><div style="font-size:12px;font-weight:700">$${d.premium||0}</div></div>
          <div style="text-align:right"><div style="font-size:7px;color:#44445a">TARGET EXIT</div><div style="font-size:12px;font-weight:700;color:#00ff88">$${d.targetExit||0}</div></div>
        </div>
      </div>
      <div class="thesis">${d.thesis||""}</div>
      <div class="inv"><span style="color:#ff2d55;font-size:9px">INVALIDATION: </span>${d.invalidation||""}</div>
      <div class="tags">${(d.catalysts||[]).map(c=>chip("◆ "+c,"#4fc3f7")).join("")}${(d.warnings||[]).filter(Boolean).map(w=>chip("⚠ "+w,"#ffcc00")).join("")}</div>
    </div>
  </div>`;
}

function render(){
  const app=document.getElementById("app");
  if(!state.keysReady){
    const fhOk=state.finnhubKey.length>8,clOk=state.claudeKey.length>20,both=fhOk&&clOk;
    app.innerHTML=`<div class="setup"><div class="setup-box">
      <div class="slabel">SWING ITM SCANNER</div>
      <div class="stitle">Connect Your<br/>API Keys</div>
      <div class="ssub">Live prices via <a href="https://finnhub.io" target="_blank">Finnhub</a> through your Cloudflare Worker<br>Claude API for A/A+ swing trade analysis<br>Keys saved locally — never shared</div>
      <div class="spanel">
        <div class="flabel">FINNHUB API KEY</div>
        <input class="finput" type="password" placeholder="Paste Finnhub key..." value="${state.finnhubKey}" oninput="state.finnhubKey=this.value;render()"/>
        <div class="flabel">ANTHROPIC (CLAUDE) API KEY</div>
        <input class="finput" type="password" placeholder="sk-ant-..." value="${state.claudeKey}" oninput="state.claudeKey=this.value;render()"/>
        ${state.setupErr?`<div class="serr">${state.setupErr}</div>`:""}
        <button class="cbtn ${both?"ready":""}" onclick="testAndSave()">${state.testing?"TESTING...":"CONNECT →"}</button>
      </div>
      <div class="snote">🔑 Finnhub free — 60 calls/min<br>🔑 Claude API — ~$0.01 per ticker<br>🔒 Keys in browser only<br>💡 Claude key: console.anthropic.com → API Keys</div>
    </div></div>`;
    return;
  }

  const done=state.results.filter(r=>r.status==="done"&&r.data);
  const trades=done.filter(r=>r.data.signal!=="NO TRADE"&&(r.data.score||0)>=75);
  const below=done.filter(r=>r.data.signal==="NO TRADE"||(r.data.score||0)<75);
  const prime=trades.filter(r=>(r.data.score||0)>=85).length;
  const shown=[...state.results].filter(r=>{
    if(r.status!=="done")return true;
    if(!r.data)return true;
    if(r.data.signal==="NO TRADE"||(r.data.score||0)<75)return false;
    if(state.sigFilter!=="ALL"&&r.data.signal!==state.sigFilter)return false;
    return true;
  }).sort((a,b)=>(b.data?.score||0)-(a.data?.score||0));

  app.innerHTML=`
    <div class="header"><div class="header-inner">
      <div>
        <div class="logo"><span>SWING</span><span class="hi">ITM</span><span>SCANNER</span></div>
        <div class="sub">LIVE PRICES · A/A+ ONLY · 30-40 DTE · DELTA 0.65–0.85 · MIN 75% WIN RATE</div>
      </div>
      ${state.results.length>0?`<div class="stats">${[["SCANNED",state.selected.length,"#eeeef5"],["A+",prime,"#00ff88"],["SETUPS",trades.length,"#00ff88"],["SKIPPED",below.length,"#ff2d55"]].map(([l,v,c])=>`<div class="stat"><div class="sl">${l}</div><div class="sv" style="color:${c}">${v}</div></div>`).join("")}</div>`:""}
      <div style="display:flex;align-items:center;gap:10px">
        <div style="display:flex;align-items:center;gap:6px">
          <div class="dot ${state.scanning?"on":""}"></div>
          <span class="status ${state.scanning?"on":""}">${state.scanning?"LIVE SCANNING":state.scanCount>0?"SCAN #"+state.scanCount+" DONE":"READY"}</span>
        </div>
        <button class="btn-ghost" onclick="disconnect()">⬡ KEYS</button>
      </div>
    </div></div>

    <div class="main">
      <div class="banner">
        <div style="font-size:9px;color:#00ff88;font-weight:700;margin-bottom:3px">⏰ BEST SCAN TIME: 10:00–10:30 AM EST &nbsp;|&nbsp; ● Prices pulled live via Finnhub</div>
        <div style="font-size:8px;color:#44445a">A/A+ only (75+) · Min 75% win rate · Min 2:1 R/R · ITM 30-40 DTE · Delta 0.65–0.85</div>
      </div>

      <div class="controls">
        <div class="section-label">SELECT TICKERS</div>
        <div class="tickers">${PRESETS.map(t=>`<button class="tbtn ${state.selected.includes(t)?"on":""}" onclick="toggleTicker('${t}')">${t}</button>`).join("")}</div>
        <div class="custom-row">
          <input class="cinput" placeholder="ADD TICKER..." value="${state.customInput}" oninput="state.customInput=this.value.toUpperCase().replace(/[^A-Z]/g,'')" onkeydown="if(event.key==='Enter')addCustom()"/>
          <button class="add-btn" onclick="addCustom()">+ ADD</button>
          ${state.selected.filter(t=>!PRESETS.includes(t)).map(t=>`<span class="ctag" onclick="toggleTicker('${t}')">${t} ✕</span>`).join("")}
        </div>
        <div class="filter-row">
          <div>
            <div style="font-size:8px;color:#44445a;margin-bottom:6px;letter-spacing:1px">SIGNAL</div>
            <div style="display:flex;gap:4px">${["ALL","BUY","SELL"].map(f=>`<button class="fbtn ${state.sigFilter===f?"on":""}" onclick="setSigFilter('${f}')">${f}</button>`).join("")}</div>
          </div>
          <div style="font-size:9px;color:#44445a">Showing <span style="color:#00ff88">A+ (85+)</span> and <span style="color:#00e676">A (75+)</span> only</div>
          <div style="margin-left:auto">
            ${state.scanning?`<button class="scan-btn stop" onclick="stopScan()">⏹ STOP</button>`:`<button class="scan-btn ${state.selected.length?"ready":""}" onclick="runScan()" ${!state.selected.length?"disabled":""}>▶ ANALYZE ${state.selected.length}</button>`}
          </div>
        </div>
      </div>

      ${shown.length>0?`
        <div style="font-size:9px;color:#44445a;letter-spacing:1.5px;margin-bottom:14px">${trades.length} HIGH-PROBABILITY SETUPS · LIVE PRICES · SORTED BY SCORE</div>
        <div class="grid">${shown.map(renderCard).join("")}</div>
      `:`<div class="empty">
        <div style="font-size:28px;font-weight:900;letter-spacing:4px;color:#44445a;margin-bottom:10px">SELECT & ANALYZE</div>
        <div style="font-size:11px;color:#1e1e2e;line-height:2">Live prices · A/A+ only · 30-40 DTE · Delta 0.65–0.85<br>Min 75% win rate · Min 2:1 R:R</div>
      </div>`}

      ${below.length>0&&state.results.every(r=>r.status==="done")?`
        <div class="below-sec">
          <div style="font-size:8px;color:#44445a;margin-bottom:8px">BELOW THRESHOLD — NOT SHOWN</div>
          <div style="display:flex;gap:6px;flex-wrap:wrap">${below.map(r=>`<span style="font-family:monospace;font-size:9px;padding:3px 8px;background:#1a1a28;border:1px solid #ff2d5525;color:#44445a;border-radius:4px">${r.ticker} ${r.data?.score?"("+r.data.score+")":""} ✕</span>`).join("")}</div>
        </div>`:""}

      <div class="footer">FOR EDUCATIONAL USE ONLY · NOT FINANCIAL ADVICE · OPTIONS INVOLVE SUBSTANTIAL RISK</div>
    </div>`;
}

async function testAndSave(){
  if(!state.finnhubKey||!state.claudeKey)return;
  setState({testing:true,setupErr:""});
  try{
    const res=await fetch(`${WORKER}?ticker=AAPL&key=${state.finnhubKey}`);
    const d=await res.json();
    if(!d.c||d.c===0)throw new Error("Finnhub key invalid or Worker not responding");
    localStorage.setItem("fh_key",state.finnhubKey);
    localStorage.setItem("cl_key",state.claudeKey);
    setState({keysReady:true,testing:false});
  }catch(e){setState({setupErr:"❌ "+e.message,testing:false});}
}

function disconnect(){localStorage.removeItem("fh_key");localStorage.removeItem("cl_key");setState({keysReady:false,finnhubKey:"",claudeKey:"",results:[]});}
function toggleTicker(t){setState({selected:state.selected.includes(t)?state.selected.filter(x=>x!==t):[...state.selected,t]});}
function addCustom(){const t=state.customInput.trim().toUpperCase().replace(/[^A-Z]/g,"");if(t&&!state.selected.includes(t))setState({selected:[...state.selected,t],customInput:""});else setState({customInput:""});}
function setSigFilter(f){setState({sigFilter:f});}
function stopScan(){state.aborted=true;setState({scanning:false});}

render();
</script>
</body>
</html>
