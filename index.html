<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Swing ITM Scanner</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#060608;color:#eeeef5;font-family:monospace;min-height:100vh}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:#2a2a3a;border-radius:2px}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

.header{background:#0c0c12;border-bottom:1px solid #ffffff08;padding:16px 24px;position:sticky;top:0;z-index:10}
.header-inner{max-width:1100px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10}
.logo{display:flex;gap:8px;align-items:baseline}
.logo span{font-size:20px;font-weight:900;letter-spacing:4px}
.logo .hi{color:#00ff88}
.sub{font-size:9px;color:#44445a;letter-spacing:2px;margin-top:2px}
.dot{width:7px;height:7px;border-radius:50%;background:#44445a;transition:all 0.3s}
.dot.on{background:#00ff88;box-shadow:0 0 8px #00ff88;animation:pulse 1.2s infinite}
.status{font-size:9px;color:#44445a;letter-spacing:1px}
.status.on{color:#00ff88}
.btn-ghost{font-family:monospace;font-size:9px;background:transparent;border:1px solid #ffffff08;color:#44445a;padding:4px 10px;border-radius:4px;cursor:pointer;letter-spacing:1px}

.main{max-width:1100px;margin:0 auto;padding:20px 24px}

/* Setup screen */
.setup{min-height:80vh;display:flex;align-items:center;justify-content:center;padding:24px}
.setup-box{max-width:460px;width:100%;animation:fadeUp 0.5s ease}
.setup-label{font-size:9px;color:#44445a;letter-spacing:3px;margin-bottom:6px}
.setup-title{font-size:26px;font-weight:900;margin-bottom:8px;line-height:1.2}
.setup-sub{font-size:11px;color:#44445a;line-height:1.8;margin-bottom:24px}
.setup-sub a{color:#00ff88;text-decoration:none}
.setup-panel{background:#0c0c12;border:1px solid #ffffff08;border-radius:10px;padding:20px;margin-bottom:14px}
.field-label{font-size:8px;color:#44445a;letter-spacing:1px;margin-bottom:6px}
.field-input{width:100%;background:#1a1a28;border:1px solid #ffffff10;border-radius:6px;padding:10px 14px;font-family:monospace;font-size:12px;color:#eeeef5;outline:none;margin-bottom:14px}
.field-input:focus{border-color:#00ff8840}
.connect-btn{width:100%;padding:12px;border-radius:6px;font-family:monospace;font-size:13px;font-weight:700;letter-spacing:2px;border:none;cursor:not-allowed;background:#1a1a28;color:#44445a;transition:all 0.3s}
.connect-btn.ready{cursor:pointer;background:#00ff88;color:#000;box-shadow:0 0 20px #00ff8844}
.setup-note{font-size:9px;color:#2a2a4a;line-height:1.9}
.setup-err{font-size:10px;color:#ff2d55;margin-bottom:12px;padding:8px 10px;background:#ff2d5510;border-radius:4px;border:1px solid #ff2d5530}

/* Controls */
.controls{background:#0c0c12;border:1px solid #ffffff08;border-radius:12px;padding:20px;margin-bottom:22px}
.section-label{font-size:8px;color:#44445a;letter-spacing:1.5px;margin-bottom:10px}
.tickers{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
.tick-btn{font-family:monospace;font-size:11px;font-weight:700;padding:5px 12px;border-radius:5px;cursor:pointer;transition:all 0.15s;background:#1a1a28;color:#44445a;border:1px solid #ffffff08}
.tick-btn.on{background:#00ff88;color:#000;border-color:#00ff88;box-shadow:0 0 10px #00ff8833}
.custom-row{display:flex;gap:8px;align-items:center;margin-bottom:16px;flex-wrap:wrap}
.custom-input{font-family:monospace;font-size:11px;background:#1a1a28;border:1px solid #ffffff08;color:#eeeef5;padding:7px 12px;border-radius:6px;outline:none;width:150px}
.add-btn{font-family:monospace;font-size:10px;background:#1a1a28;border:1px solid #ffffff08;color:#44445a;padding:7px 12px;border-radius:6px;cursor:pointer}
.custom-tag{font-family:monospace;font-size:10px;padding:6px 11px;background:#1a1a28;border:1px solid #00ff8830;color:#00ff88;border-radius:5px;cursor:pointer}
.filter-row{display:flex;gap:20px;align-items:center;flex-wrap:wrap;border-top:1px solid #ffffff08;padding-top:16px}
.filter-group label{font-size:8px;color:#44445a;display:block;margin-bottom:6px;letter-spacing:1px}
.filter-btns{display:flex;gap:4px}
.filter-btn{font-family:monospace;font-size:10px;font-weight:700;padding:5px 12px;border-radius:4px;cursor:pointer;background:#1a1a28;color:#44445a;border:1px solid #ffffff08;transition:all 0.15s}
.filter-btn.on{background:#00ff88;color:#000;border-color:#00ff88}
.scan-btn{font-family:monospace;font-size:12px;font-weight:700;letter-spacing:2px;padding:11px 28px;border-radius:7px;cursor:not-allowed;border:none;transition:all 0.25s;background:#1a1a28;color:#44445a}
.scan-btn.ready{cursor:pointer;background:#00ff88;color:#000;box-shadow:0 0 22px #00ff8844}
.scan-btn.stop{cursor:pointer;background:#ff2d55;color:#fff}

/* Stats */
.stats{display:flex;gap:16px}
.stat .sl{font-size:8px;color:#44445a}
.stat .sv{font-size:16px;font-weight:900}

/* Results */
.results-label{font-size:9px;color:#44445a;letter-spacing:1.5px;margin-bottom:14px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:14px}

/* Cards */
.card{background:#10101a;border-radius:12px;overflow:hidden;border:1px solid #ffffff08;animation:fadeUp 0.4s ease}
.card-bar{height:2px}
.card-body{padding:18px}
.card-header{display:flex;gap:14px;align-items:flex-start;margin-bottom:16px}
.ring{position:relative;width:72px;height:72px;flex-shrink:0}
.ring svg{transform:rotate(-90deg)}
.ring-text{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.card-info{flex:1;min-width:0}
.title-row{display:flex;align-items:center;gap:8px;margin-bottom:5px;flex-wrap:wrap}
.ticker-name{font-size:20px;font-weight:900;letter-spacing:3px}
.sig-badge{font-size:11px;font-weight:700;letter-spacing:2px;padding:3px 10px;border-radius:4px;color:#000}
.chip{font-size:9px;letter-spacing:1.2px;padding:3px 8px;border-radius:3px}
.price-line{font-size:11px;color:#44445a}
.price-val{font-size:14px;font-weight:700;color:#eeeef5}
.win-box{text-align:right;flex-shrink:0}
.win-label{font-size:8px;color:#44445a}
.win-val{font-size:24px;font-weight:900;line-height:1.1}
.win-sub{font-size:8px}

.score-section{background:#1a1a28;border-radius:8px;padding:12px 14px;margin-bottom:14px;display:flex;flex-direction:column;gap:7px}
.score-row{display:flex;align-items:center;gap:8px}
.score-label{font-size:9px;color:#44445a;width:112px;flex-shrink:0}
.score-track{flex:1;height:3px;background:#0c0c12;border-radius:2px;overflow:hidden}
.score-fill{height:100%;border-radius:2px;transition:width 1.3s ease}
.score-num{font-size:9px;width:28px;text-align:right}

.setup-row{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
.setup-name{font-size:10px;font-weight:700}

.targets{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:14px}
.tbox{background:#1a1a28;border-radius:7px;padding:10px 8px}
.tbox-label{font-size:8px;color:#44445a;margin-bottom:4px}
.tbox-val{font-size:12px;font-weight:700}

.contract{background:#1a1a28;border-radius:8px;padding:14px;margin-bottom:14px}
.contract-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.contract-type{font-size:11px;font-weight:700;letter-spacing:2px;padding:3px 10px;border-radius:4px;color:#000}
.contract-delta{font-size:10px;color:#ffcc00}
.contract-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px}
.contract-item label{font-size:8px;color:#44445a;display:block}
.contract-item span{font-size:11px;font-weight:700}
.contract-footer{display:flex;justify-content:space-between;border-top:1px solid #ffffff08;padding-top:8px}
.cfl{font-size:8px;color:#44445a}
.cfv{font-size:12px;font-weight:700}

.thesis{font-size:11px;color:#9090b8;line-height:1.8;border-top:1px solid #ffffff08;padding-top:12px;margin-bottom:12px}
.inv-box{background:#ff2d550a;border:1px solid #ff2d5525;border-radius:6px;padding:8px 12px;margin-bottom:12px}
.inv-label{font-size:9px;color:#ff2d55}
.inv-text{font-size:10px;color:#9090b8}
.tags{display:flex;gap:6px;flex-wrap:wrap}

.loading-card{background:#10101a;border:1px solid #ffffff08;border-radius:12px;padding:18px;display:flex;align-items:center;gap:10}
.spinner{width:14px;height:14px;border:2px solid #1a1a28;border-top:2px solid #00ff88;border-radius:50%;animation:spin 0.7s linear infinite;flex-shrink:0}
.loading-text{font-size:12px;color:#44445a}
.error-card{background:#10101a;border:1px solid #ff2d5530;border-radius:12px;padding:18px}
.error-text{font-size:10px;color:#ff2d55;word-break:break-word;line-height:1.7}
.notrade-card{background:#10101a;border:1px solid #ff2d5520;border-radius:12px;padding:18px;display:flex;gap:12px;align-items:center}
.notrade-icon{width:54px;height:54px;border-radius:50%;background:#ff2d5512;border:1px solid #ff2d5522;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:20px;color:#ff2d55}
.notrade-name{font-size:16px;font-weight:900}
.notrade-msg{font-size:10px;color:#ff2d55;margin-top:4px}

.empty{text-align:center;padding-top:80px}
.empty-title{font-size:28px;font-weight:900;letter-spacing:4px;color:#44445a;margin-bottom:10px}
.empty-sub{font-size:11px;color:#1e1e2e;line-height:2}
.footer{margin-top:50px;font-size:9px;color:#1a1a28;text-align:center;line-height:2;padding-bottom:30px}
</style>
</head>
<body>
<div id="app"></div>
<script>
const PRESETS = ["SPY","QQQ","AAPL","NVDA","MSFT","INTC","AMD","META","TSLA","AMZN","GOOGL","IWM","PLTR","NFLX","JPM","GS","COIN","MSTR"];
const TODAY = new Date().toLocaleDateString("en-US",{weekday:"long",year:"numeric",month:"long",day:"numeric"});
const EXP = (()=>{ const d=new Date(); d.setDate(d.getDate()+35); return d.toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"}); })();

let state = {
  finnhubKey: localStorage.getItem("fh_key")||"",
  claudeKey:  localStorage.getItem("cl_key")||"",
  keysReady:  !!(localStorage.getItem("fh_key")&&localStorage.getItem("cl_key")),
  selected:   ["NVDA","AAPL","SPY","INTC"],
  results:    [],
  scanning:   false,
  aborted:    false,
  minScore:   65,
  sigFilter:  "ALL",
  scanCount:  0,
  customInput:"",
  setupErr:   "",
  testing:    false,
};

function setState(patch){ state={...state,...patch}; render(); }

// ── API CALLS ─────────────────────────────────────────────────────────────────
async function fetchPrice(ticker) {
  const res = await fetch(
    `https://finnhub.io/api/v1/quote?symbol=${ticker}&token=${state.finnhubKey}`
  );
  if (!res.ok) throw new Error(`Finnhub error ${res.status} for ${ticker}`);
  const d = await res.json();
  if (!d.c || d.c === 0) throw new Error(`No price for ${ticker} — check symbol`);
  return +d.c.toFixed(2);
}

async function analyzeWithClaude(ticker, price) {
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-api-key": state.claudeKey,
      "anthropic-version": "2023-06-01",
      "anthropic-dangerous-allow-browser": "true"
    },
    body: JSON.stringify({
      model: "claude-opus-4-6",
      max_tokens: 1024,
      messages:[{
        role:"user",
        content:`You are an educational swing trade options analyst. Today is ${TODAY}.

${ticker} current price is $${price}. Use $${price} for ALL calculations.

Analyze for a high-probability ITM swing trade:
- BUY = bullish, ITM CALL, delta 0.65-0.85, strike BELOW $${price}
- SELL = bearish, ITM PUT, delta 0.65-0.85, strike ABOVE $${price}  
- NO TRADE = if score below 65 or no quality setup
- Expiry: ${EXP} (~35 DTE)
- Min 2:1 R/R
- Entry, TP1, TP2, Stop all relative to $${price}

YOUR ENTIRE RESPONSE MUST BE ONLY A VALID JSON OBJECT. NO BACKTICKS. NO MARKDOWN. START WITH { END WITH }

{"ticker":"${ticker}","price":${price},"trend":"BULLISH","strength":"STRONG","signal":"BUY","control":"BUYERS","score":80,"winRate":75,"pop":70,"trendPts":20,"setupPts":20,"optionsPts":16,"volumePts":12,"rrPts":12,"setupName":"Trend Continuation","timeframe":"Daily + Weekly","keyLevel":0,"keyType":"SUPPORT","entry":0,"tp1":0,"tp2":0,"stop":0,"rr":"2.5:1","optType":"CALL","strike":0,"expiry":"${EXP}","dte":35,"delta":0.72,"premium":0,"itmDepth":0,"maxRisk":0,"targetExit":0,"catalyst1":"momentum","catalyst2":"sector strength","warning":"","thesis":"Real 3-sentence thesis for ${ticker} at $${price}.","invalidation":"Specific price that invalidates this trade."}`
      }]
    })
  });
  const json = await res.json();
  if (json.error) throw new Error(json.error.message);
  const text = (json.content||[]).map(b=>b.text||"").join("").trim();
  const i=text.indexOf("{"), j=text.lastIndexOf("}");
  if(i<0||j<0) throw new Error("Bad response: "+text.slice(0,80));
  const d = JSON.parse(text.slice(i,j+1));
  d.price = price;
  d.scores = {trend:d.trendPts,setup:d.setupPts,options:d.optionsPts,volume:d.volumePts,rr:d.rrPts};
  d.catalysts = [d.catalyst1,d.catalyst2].filter(Boolean);
  d.warnings = [d.warning].filter(Boolean);
  return d;
}

async function runScan() {
  if(!state.selected.length||state.scanning) return;
  state.aborted=false;
  setState({scanning:true,scanCount:state.scanCount+1,
    results:state.selected.map(t=>({ticker:t,status:"loading",data:null,error:null,price:null,step:"price"}))});

  for(const ticker of state.selected){
    if(state.aborted) break;
    try {
      // Step 1: live price
      updateResult(ticker,{step:"price"});
      const price = await fetchPrice(ticker);
      updateResult(ticker,{price,step:"analysis"});
      // Step 2: Claude analysis
      const data = await analyzeWithClaude(ticker, price);
      updateResult(ticker,{status:"done",data});
    } catch(e) {
      updateResult(ticker,{status:"error",error:e.message});
    }
    await sleep(300);
  }
  setState({scanning:false});
}

function updateResult(ticker,patch){
  state.results = state.results.map(r=>r.ticker===ticker?{...r,...patch}:r);
  render();
}
function sleep(ms){return new Promise(r=>setTimeout(r,ms));}

// ── RENDER HELPERS ────────────────────────────────────────────────────────────
function grade(s){
  if(s>=85) return {l:"A+",c:"#00ff88",t:"PRIME"};
  if(s>=75) return {l:"A", c:"#00e676",t:"HIGH PROB"};
  if(s>=65) return {l:"B+",c:"#69f0ae",t:"SOLID"};
  if(s>=55) return {l:"B", c:"#ffab00",t:"MODERATE"};
  return           {l:"C", c:"#ff6d00",t:"WEAK"};
}

function ring(score){
  const g=grade(score),r=28,C=2*Math.PI*r,f=(score/100)*C;
  return `<div class="ring">
    <svg width="72" height="72">
      <circle cx="36" cy="36" r="${r}" fill="none" stroke="#1a1a28" stroke-width="4"/>
      <circle cx="36" cy="36" r="${r}" fill="none" stroke="${g.c}" stroke-width="4"
        stroke-dasharray="${f} ${C}" stroke-linecap="round"
        style="filter:drop-shadow(0 0 6px ${g.c}88);transform:rotate(-90deg);transform-origin:50% 50%"/>
    </svg>
    <div class="ring-text">
      <span style="font-size:16px;font-weight:900;color:${g.c};line-height:1">${g.l}</span>
      <span style="font-size:9px;color:#44445a">${score}</span>
    </div>
  </div>`;
}

function chip(label,color="#44445a"){
  return `<span class="chip" style="color:${color};border:1px solid ${color}35;background:${color}15">${label}</span>`;
}

function scoreBar(label,val,max,col){
  const pct=Math.min(100,Math.round((val/max)*100));
  return `<div class="score-row">
    <span class="score-label">${label}</span>
    <div class="score-track"><div class="score-fill" style="width:${pct}%;background:${col}"></div></div>
    <span class="score-num" style="color:${col}">${val}/${max}</span>
  </div>`;
}

function renderCard(r){
  if(r.status==="loading") return `
    <div class="loading-card">
      <div class="spinner"></div>
      <span class="loading-text">${r.step==="price"?`Fetching ${r.ticker} price...`:`Analyzing ${r.ticker} at $${r.price}...`}</span>
    </div>`;

  if(r.status==="error") return `
    <div class="error-card">
      <div class="error-text"><strong>⚠ ${r.ticker}:</strong><br>${r.error}</div>
    </div>`;

  if(!r.data) return "";
  const d=r.data;

  if(d.signal==="NO TRADE") return `
    <div class="notrade-card">
      <div class="notrade-icon">✕</div>
      <div>
        <div class="notrade-name">${d.ticker}</div>
        <div class="notrade-msg">NO TRADE — Does not meet criteria</div>
        <div style="font-size:9px;color:#44445a;margin-top:3px">Score below threshold · Skip today</div>
      </div>
    </div>`;

  const g=grade(d.score||0);
  const sc=d.signal==="BUY"?"#00ff88":"#ff2d55";
  const tc=d.trend==="BULLISH"?"#00ff88":d.trend==="BEARISH"?"#ff2d55":"#ffcc00";
  const ac=d.optType==="CALL"?"#00ff88":"#ff2d55";
  const s=d.scores||{};

  return `
    <div class="card" style="border-color:${sc}20">
      <div class="card-bar" style="background:linear-gradient(90deg,${sc},transparent)"></div>
      <div class="card-body">
        <div class="card-header">
          ${ring(d.score||0)}
          <div class="card-info">
            <div class="title-row">
              <span class="ticker-name">${d.ticker}</span>
              <span class="sig-badge" style="background:${sc};box-shadow:0 0 14px ${sc}55">${d.signal}</span>
              ${chip(d.trend,tc)}
              ${chip(d.strength)}
            </div>
            <div class="price-line">
              <span class="price-val">$${d.price}</span>
              <span style="margin-left:10px">${d.control} in control</span>
            </div>
          </div>
          <div class="win-box">
            <div class="win-label">WIN RATE</div>
            <div class="win-val" style="color:${g.c}">${d.winRate}%</div>
            <div class="win-sub" style="color:${g.c}">${g.t}</div>
          </div>
        </div>

        <div class="score-section">
          <div style="font-size:8px;color:#44445a;letter-spacing:1.5px;margin-bottom:2px">SETUP SCORE</div>
          ${scoreBar("TREND ALIGNMENT",  s.trend||0,  25,"#00ff88")}
          ${scoreBar("SETUP QUALITY",    s.setup||0,  25,"#4fc3f7")}
          ${scoreBar("OPTIONS STRUCTURE",s.options||0,20,"#ffcc00")}
          ${scoreBar("VOLUME/MOMENTUM",  s.volume||0, 15,"#00ff88")}
          ${scoreBar("RISK/REWARD",      s.rr||0,     15,"#ffcc00")}
        </div>

        <div class="setup-row">
          <span class="setup-name" style="color:${sc}">⬡ ${d.setupName||""}</span>
          ${chip(d.timeframe||"","#4fc3f7")}
          ${chip((d.keyType||"")+" $"+(d.keyLevel||0),"#ffcc00")}
          ${chip("PoP "+(d.pop||0)+"%","#00ff88")}
        </div>

        <div class="targets">
          ${[["ENTRY","$"+d.entry,"#eeeef5"],["TP1","$"+d.tp1,"#00ff88"],["TP2","$"+d.tp2,"#69f0ae"],
             ["STOP","$"+d.stop,"#ff2d55"],["R:R",d.rr,"#ffcc00"]].map(([l,v,c])=>`
            <div class="tbox">
              <div class="tbox-label">${l}</div>
              <div class="tbox-val" style="color:${c}">${v}</div>
            </div>`).join("")}
        </div>

        <div class="contract" style="border:1px solid ${ac}25">
          <div class="contract-header">
            <span class="contract-type" style="background:${ac}">${d.optType||""}</span>
            <span class="contract-delta">Δ ${Number(d.delta||0).toFixed(2)}</span>
          </div>
          <div class="contract-grid">
            ${[["STRIKE","$"+(d.strike||0),ac],["EXPIRY",d.expiry||"",ac],["DTE",(d.dte||0)+"d","#ffcc00"],
               ["PREMIUM","$"+(d.premium||0),"#eeeef5"],["ITM DEPTH","$"+(d.itmDepth||0),ac],
               ["MAX RISK","$"+(d.maxRisk||0),"#ff2d55"]].map(([l,v,c])=>`
              <div class="contract-item">
                <label>${l}</label>
                <span style="color:${c}">${v}</span>
              </div>`).join("")}
          </div>
          <div class="contract-footer">
            <div><div class="cfl">ENTRY PREMIUM</div><div class="cfv">$${d.premium||0}</div></div>
            <div style="text-align:right"><div class="cfl">TARGET EXIT</div><div class="cfv" style="color:#00ff88">$${d.targetExit||0}</div></div>
          </div>
        </div>

        <div class="thesis">${d.thesis||""}</div>
        <div class="inv-box">
          <span class="inv-label">INVALIDATION: </span>
          <span class="inv-text">${d.invalidation||""}</span>
        </div>
        <div class="tags">
          ${(d.catalysts||[]).map(c=>chip("◆ "+c,"#4fc3f7")).join("")}
          ${(d.warnings||[]).filter(Boolean).map(w=>chip("⚠ "+w,"#ffcc00")).join("")}
        </div>
      </div>
    </div>`;
}

// ── MAIN RENDER ───────────────────────────────────────────────────────────────
function render(){
  const app=document.getElementById("app");

  if(!state.keysReady){
    const fhOk=state.finnhubKey.length>8;
    const clOk=state.claudeKey.length>20;
    const bothOk=fhOk&&clOk;
    app.innerHTML=`
      <div class="setup">
        <div class="setup-box">
          <div class="setup-label">SWING ITM SCANNER</div>
          <div class="setup-title">Connect Your<br/>API Keys</div>
          <div class="setup-sub">
            Live prices via <a href="https://finnhub.io" target="_blank">Finnhub</a> · Analysis via Claude API<br>
            Keys saved locally — never shared anywhere.<br>
            Get Claude key at <a href="https://console.anthropic.com" target="_blank">console.anthropic.com</a> → API Keys
          </div>
          <div class="setup-panel">
            <div class="field-label">FINNHUB API KEY</div>
            <input class="field-input" type="password" id="fhInput" placeholder="Paste Finnhub key..."
              value="${state.finnhubKey}"
              oninput="state.finnhubKey=this.value;render()"/>
            <div class="field-label">ANTHROPIC (CLAUDE) API KEY</div>
            <input class="field-input" type="password" id="clInput" placeholder="sk-ant-..."
              value="${state.claudeKey}"
              oninput="state.claudeKey=this.value;render()"/>
            ${state.setupErr?`<div class="setup-err">${state.setupErr}</div>`:""}
            <button class="connect-btn ${bothOk?"ready":""}" onclick="testAndSave()" ${bothOk?"":""}>
              ${state.testing?"TESTING KEYS...":"CONNECT →"}
            </button>
          </div>
          <div class="setup-note">
            🔑 Finnhub free tier: 60 calls/min — plenty for scanning<br>
            🔑 Claude API: ~$0.01 per ticker analyzed<br>
            🔒 Keys stored in browser localStorage only
          </div>
        </div>
      </div>`;
    return;
  }

  const done   = state.results.filter(r=>r.status==="done"&&r.data);
  const trades = done.filter(r=>r.data.signal!=="NO TRADE");
  const skips  = done.filter(r=>r.data.signal==="NO TRADE");
  const prime  = trades.filter(r=>(r.data.score||0)>=75).length;

  const shown = [...state.results]
    .filter(r=>{
      if(r.status!=="done") return true;
      if(!r.data||r.data.signal==="NO TRADE") return true;
      if(state.sigFilter!=="ALL"&&r.data.signal!==state.sigFilter) return false;
      if((r.data.score||0)<state.minScore) return false;
      return true;
    })
    .sort((a,b)=>(b.data?.score||0)-(a.data?.score||0));

  app.innerHTML=`
    <div class="header">
      <div class="header-inner">
        <div>
          <div class="logo">
            <span>SWING</span><span class="hi">ITM</span><span>SCANNER</span>
          </div>
          <div class="sub">LIVE PRICES · HIGH PROBABILITY · 30-40 DTE · DELTA 0.65–0.85</div>
        </div>
        ${state.results.length>0?`
        <div class="stats">
          ${[["SCANNED",state.selected.length,"#eeeef5"],["SETUPS",trades.length,"#eeeef5"],
             ["PRIME",prime,"#00ff88"],["SKIPPED",skips.length,"#ff2d55"]].map(([l,v,c])=>`
            <div class="stat">
              <div class="sl">${l}</div>
              <div class="sv" style="color:${c}">${v}</div>
            </div>`).join("")}
        </div>`:""}
        <div style="display:flex;align-items:center;gap:10px">
          <div style="display:flex;align-items:center;gap:6px">
            <div class="dot ${state.scanning?"on":""}"></div>
            <span class="status ${state.scanning?"on":""}">
              ${state.scanning?"LIVE SCANNING":state.scanCount>0?"SCAN #"+state.scanCount+" DONE":"READY"}
            </span>
          </div>
          <button class="btn-ghost" onclick="disconnect()">⬡ KEYS</button>
        </div>
      </div>
    </div>

    <div class="main">
      <div class="controls">
        <div class="section-label">SELECT TICKERS</div>
        <div class="tickers">
          ${PRESETS.map(t=>`
            <button class="tick-btn ${state.selected.includes(t)?"on":""}"
              onclick="toggleTicker('${t}')">${t}</button>`).join("")}
        </div>
        <div class="custom-row">
          <input class="custom-input" id="customInput" placeholder="ADD TICKER..."
            value="${state.customInput}"
            oninput="state.customInput=this.value.toUpperCase().replace(/[^A-Z]/g,'')"
            onkeydown="if(event.key==='Enter')addCustom()"/>
          <button class="add-btn" onclick="addCustom()">+ ADD</button>
          ${state.selected.filter(t=>!PRESETS.includes(t)).map(t=>`
            <span class="custom-tag" onclick="toggleTicker('${t}')">${t} ✕</span>`).join("")}
        </div>
        <div class="filter-row">
          <div class="filter-group">
            <label>SIGNAL FILTER</label>
            <div class="filter-btns">
              ${["ALL","BUY","SELL"].map(f=>`
                <button class="filter-btn ${state.sigFilter===f?"on":""}"
                  onclick="setSigFilter('${f}')">${f}</button>`).join("")}
            </div>
          </div>
          <div>
            <div style="font-size:8px;color:#44445a;letter-spacing:1px;margin-bottom:6px">
              MIN SCORE — <span style="color:#00ff88">${state.minScore}/100</span>
            </div>
            <input type="range" min="50" max="90" value="${state.minScore}"
              oninput="state.minScore=+this.value;render()"
              style="accent-color:#00ff88;width:140px;cursor:pointer"/>
          </div>
          <div style="font-size:10px;color:#44445a">
            <span style="color:#00ff88">A+/A</span> = Prime ·
            <span style="color:#69f0ae">B+</span> = Take ·
            <span style="color:#ffcc00">B</span> = Moderate ·
            <span style="color:#ff2d55">✕</span> = Skip
          </div>
          <div style="margin-left:auto">
            ${state.scanning?`
              <button class="scan-btn stop" onclick="stopScan()">⏹ STOP</button>
            `:`
              <button class="scan-btn ${state.selected.length?"ready":""}"
                onclick="runScan()" ${!state.selected.length?"disabled":""}>
                ▶ ANALYZE ${state.selected.length}
              </button>`}
          </div>
        </div>
      </div>

      ${shown.length>0?`
        <div class="results-label">${trades.length} SETUPS · ${prime} PRIME · SORTED BY SCORE</div>
        <div class="grid">${shown.map(renderCard).join("")}</div>
      `:`
        <div class="empty">
          <div class="empty-title">SELECT & ANALYZE</div>
          <div class="empty-sub">
            Live prices via Finnhub · ITM contracts · 30-40 DTE · Delta 0.65–0.85<br>
            Min 70% win rate · Min 2:1 R:R · Weak setups auto-rejected
          </div>
        </div>`}

      <div class="footer">
        FOR EDUCATIONAL USE ONLY · NOT FINANCIAL ADVICE · OPTIONS INVOLVE SUBSTANTIAL RISK<br>
        AI ANALYSIS BASED ON HISTORICAL PATTERNS · ALWAYS VERIFY BEFORE LIVE TRADING
      </div>
    </div>`;
}

// ── ACTIONS ───────────────────────────────────────────────────────────────────
async function testAndSave(){
  if(!state.finnhubKey||!state.claudeKey) return;
  setState({testing:true,setupErr:""});
  try {
    const res = await fetch(`https://finnhub.io/api/v1/quote?symbol=AAPL&token=${state.finnhubKey}`);
    const d = await res.json();
    if(!d.c||d.c===0) throw new Error("Finnhub key invalid or no data returned");
    localStorage.setItem("fh_key",state.finnhubKey);
    localStorage.setItem("cl_key",state.claudeKey);
    setState({keysReady:true,testing:false});
  } catch(e){
    setState({setupErr:"❌ "+e.message,testing:false});
  }
}

function disconnect(){
  localStorage.removeItem("fh_key");
  localStorage.removeItem("cl_key");
  setState({keysReady:false,finnhubKey:"",claudeKey:"",results:[]});
}

function toggleTicker(t){
  const sel=state.selected.includes(t)?state.selected.filter(x=>x!==t):[...state.selected,t];
  setState({selected:sel});
}

function addCustom(){
  const t=state.customInput.trim().toUpperCase().replace(/[^A-Z]/g,"");
  if(t&&!state.selected.includes(t)) setState({selected:[...state.selected,t],customInput:""});
  else setState({customInput:""});
}

function setSigFilter(f){setState({sigFilter:f});}

function stopScan(){state.aborted=true;setState({scanning:false});}

render();
</script>
</body>
</html>
